<!DOCTYPE html>
<html>
<head>
<title>Weather Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b') no-repeat center center/cover;
    height: 100vh;
}

/* DARK OVERLAY */
.overlay {
    background: rgba(0,0,0,0.5);
    height: 100%;
    padding: 30px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin-top: 60px;
}

.search-box input {
    padding: 15px;
    width: 350px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
}

.search-box button {
    padding: 15px 20px;
    border-radius: 30px;
    border: none;
    background: #00c6ff;
    color: white;
    margin-left: 10px;
    cursor: pointer;
}

/* MAIN CARD */
.main-card {
    margin: 60px auto;
    width: 320px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    text-align: center;
}

.temp {
    font-size: 60px;
    font-weight: bold;
}

.desc {
    opacity: 0.8;
}

/* GRID */
.grid {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.remove {
    margin-top: 10px;
    background: red;
    border: none;
    padding: 8px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">🌤 Weather Pro</div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <form method="POST">
            <input name="city" placeholder="Search city...">
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- MAIN CITY -->
    {% if weather_list %}
    <div class="main-card">
        <h2>{{ weather_list[0].city }}</h2>
        <div class="temp">{{ weather_list[0].temp }}°C</div>
        <div class="desc">{{ weather_list[0].desc }}</div>
        <p>AQI: {{ weather_list[0].aqi if weather_list[0].aqi else "N/A" }}</p>
    </div>
    {% endif %}

    <!-- OTHER CITIES -->
    <div class="grid">
        {% for w in weather_list[1:] %}
        <div class="card">
            <h3>{{ w.city }}</h3>
            <p>{{ w.temp }}°C</p>
            <p>{{ w.desc }}</p>

            <form method="POST">
                <input type="hidden" name="remove" value="{{ w.city }}">
                <button class="remove">Remove</button>
            </form>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
