<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <!-- Lexend Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            overflow: hidden;
        }

        /* animated background glow */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ffffff33, transparent);
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-100px, -100px); }
            50% { transform: translate(100px, 100px); }
            100% { transform: translate(-100px, -100px); }
        }

        .card {
            backdrop-filter: blur(25px);
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 30px;
            width: 340px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            padding: 12px;
            width: 85%;
            border-radius: 12px;
            border: none;
            outline: none;
            margin-bottom: 12px;
            font-size: 14px;
        }

        button {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.25);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        .weather {
            margin-top: 20px;
            animation: fadeIn 0.6s ease;
        }

        .temp {
            font-size: 45px;
            font-weight: 700;
            margin: 10px 0;
        }

        img {
            width: 90px;
            animation: floatIcon 3s infinite ease-in-out;
        }

        @keyframes floatIcon {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        .city {
            font-size: 22px;
            font-weight: 500;
        }

        .desc {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🌤 Weather</h2>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <br>
        <button type="submit">Check</button>
    </form>

    {% if weather %}
        <div class="weather">
            {% if weather.error %}
                <p>{{ weather.error }}</p>
            {% else %}
                <div class="city">{{ weather.city }}</div>
                <div class="temp">{{ weather.temperature }}°C</div>
                <div class="desc">{{ weather.description }}</div>
                <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
