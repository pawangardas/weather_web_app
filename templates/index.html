<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .weather {
            margin-top: 20px;
        }

        .temp {
            font-size: 28px;
            font-weight: bold;
        }

        img {
            width: 80px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌤 Weather App</h2>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <br>
        <button type="submit">Get Weather</button>
    </form>

    {% if weather %}
        <div class="weather">
            {% if weather.error %}
                <p>{{ weather.error }}</p>
            {% else %}
                <h3>{{ weather.city }}</h3>
                <div class="temp">{{ weather.temperature }}°C</div>
                <p>{{ weather.description }}</p>
                <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
